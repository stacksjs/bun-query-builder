name: Releaser

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Pantry
        uses: home-lang/pantry/packages/action@main

      - name: Install Dependencies
        run: bun install --ignore-scripts

      - name: Publish
        working-directory: packages/bun-query-builder
        run: pantry publish --npm --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build Release Binaries
        run: cd packages/bun-query-builder && bun run compile:all && bun run zip

      - name: Create GitHub Release
        uses: stacksjs/action-releaser@v1.2.9
        with:
          files: |
            packages/bun-query-builder/bin/qbx-linux-x64.zip
            packages/bun-query-builder/bin/qbx-linux-arm64.zip
            packages/bun-query-builder/bin/qbx-windows-x64.zip
            packages/bun-query-builder/bin/qbx-darwin-x64.zip
            packages/bun-query-builder/bin/qbx-darwin-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
